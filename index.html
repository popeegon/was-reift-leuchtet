    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">GEDANKENGANG ALS TOPOLOGIE</div>
    <p style="margin:0 0 10px;">Ein Chat ist mehr als eine Folge von Nachrichten. Er besitzt eine innere Gestalt: Gedanken tauchen auf, werden verlassen, kehren wieder, verzweigen sich, verdichten sich oder verlieren an Gewicht. Manche Begriffe erscheinen nur kurz. Andere tragen den Verlauf über längere Strecken. Wieder andere ruhen eine Zeit lang und werden später erneut aufgegriffen.</p>
    <p style="margin:0 0 10px;"><i>Was reift, leuchtet</i> versucht, diese Bewegung sichtbar zu machen. Nicht als Zusammenfassung, nicht als Bewertung und nicht als Illustration einzelner Inhalte, sondern als räumlich-zeitliche <b>Topologie eines Gedankengangs</b>.</p>
    <p style="margin:0 0 24px;">Topologie meint hier: die Ordnung von Nähe, Wiederkehr, Gewichtung und Verbindung. Was im Text nah beieinander liegt, was sich wiederholt, was später zurückkehrt oder mit anderen Motiven verbunden ist, erhält eine räumliche und zeitliche Entsprechung. Aus dem Verlauf des Chats entsteht ein bewegtes Bildfeld.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">VERFAHREN</div>
    <p style="margin:0 0 10px;">Der eingegebene Text wird lokal im Browser untersucht. Er wird in Abschnitte geteilt, normalisiert und auf wiederkehrende Wörter, Motive, Verteilungen und Beziehungen hin ausgewertet. Dabei zählt nicht nur, wie häufig ein Begriff erscheint, sondern auch, wann er auftaucht, wie weit er sich durch den Verlauf zieht, mit welchen anderen Begriffen er in Nähe steht und ob er später wieder aufgenommen wird.</p>
    <p style="margin:0 0 10px;">Aus diesen Signalen entstehen Motive. Ein Motiv ist hier kein erklärendes Schlagwort und keine semantische Deutung, sondern ein visuelles Gravitationszentrum. Um solche Zentren sammeln sich Formen, Bewegungen, Verbindungen und Sedimente.</p>
    <p style="margin:0 0 24px;">Das Verfahren verwendet kein Sprachmodell und keine externe KI-Auswertung. Es entscheidet nicht, was ein Chat „bedeutet“. Es liest Textur: Wiederholung, Abstand, Nähe, Dichte, Spannung, Rückkehr. Darin liegt seine Grenze, aber auch seine Genauigkeit. Das Werk versteht den Text nicht wie ein Mensch; es macht sichtbar, welche formalen Spuren der Text selbst erzeugt.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">VOM TEXT ZUM BILDKÖRPER</div>
    <p style="margin:0 0 10px;">Der Text ist das Skelett der Visualisierung. Er bestimmt die innere Ordnung: Motive, Zentren, Beziehungen, Impulse, Reifungsphasen. Sobald diese Struktur ausgewertet ist, tritt der Text selbst zurück. Was bleibt, ist kein lesbarer Chat mehr, sondern ein Bildkörper, der aus ihm hervorgegangen ist.</p>
    <p style="margin:0 0 10px;">Die Visualisierung zeigt also nicht den Text als Text. Sie zeigt, was von ihm übrig bleibt, wenn seine sprachliche Oberfläche entfernt wird: eine bewegte Topologie aus Verdichtung, Erinnerung, Wiederkehr und Verbindung.</p>
    <p style="margin:0 0 24px;">So entsteht eine eigentümliche Verschiebung. Der Chat wird nicht erklärt, sondern in einen anderen Zustand überführt. Aus Sätzen werden Kräfte. Aus Wiederholungen werden Zentren. Aus Rückgriffen werden Reaktivierungen. Aus Vergangenem wird Sediment.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">WAS IM BILD GESCHIEHT</div>
    <p style="margin:0 0 10px;">Zu Beginn erscheinen einzelne Formen, noch lose und tastend. Mit zunehmendem Verlauf entstehen Cluster. Einige verdichten sich, andere bleiben randständig, manche treten zurück. Zwischen verwandten Motiven bilden sich Filamente und Lauflichter. Sie markieren Beziehungen, Übergänge und erneute Aktivierungen, ohne daraus ein Diagramm zu machen.</p>
    <p style="margin:0 0 10px;">Die Cluster bewegen sich nicht nur durch das Bild; ihre Formen können sich auch um gemeinsame Zentren drehen. Diese Rotation ist als innere Bewegung eines Motivfeldes gedacht. Sie erzeugt keine Spur der Bewegung, sondern verschiebt und ordnet das Cluster von innen.</p>
    <p style="margin:0 0 10px;">Was aus dem Vordergrund verschwindet, wird nicht gelöscht. Es geht in eine Gedächtnisebene über: als Sediment, als schwacher Rest, als Hülle. Wenn ein früheres Thema später erneut aufgegriffen wird, können Teile dieser Sedimente wieder aufglimmen. Erinnerung erscheint dadurch nicht als Archiv fertiger Zeichen, sondern als Material, das ruhen, nachwirken und wieder aktiv werden kann.</p>
    <p style="margin:0 0 24px;">Der gleiche Text erzeugt eine verwandte Grundstruktur, aber keine pixelgenaue Wiederholung. Die Topologie bleibt erkennbar, die konkrete Ausführung variiert. Das Bild ist daher weder Zufall noch Abbildung. Es ist eine Möglichkeit des Textes.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">DIE SCHIEBEREGLER</div>
    <p style="margin:0 0 10px;">Die Regler sind keine bloße Nachbearbeitung. Sie bestimmen, wie der Chat als Bildkörper gelesen wird. Beim Auswerten eines Textes stellen sich die Schieberegler zunächst auf die erkannte Textstruktur ein. Ein kurzer, dünner Text beginnt anders als ein langer, stark vernetzter Chat. Danach bleiben alle Werte manuell veränderbar.</p>
    <p style="margin:0 0 6px;"><b>Belebung</b> bestimmt, wie dicht das Bild bevölkert ist.</p>
    <p style="margin:0 0 6px;"><b>Tempo</b> regelt, wie schnell der visuelle Prozess abläuft.</p>
    <p style="margin:0 0 6px;"><b>Gedächtnis</b> steuert, wie stark Vergangenes im Bild bleibt. Bei hohen Werten sedimentieren Formen deutlicher.</p>
    <p style="margin:0 0 6px;"><b>Zentren</b> legt fest, wie viele Motivzentren maximal aktiv werden können.</p>
    <p style="margin:0 0 6px;"><b>Reifung</b> beeinflusst, wie schnell aus Textimpulsen sichtbare Formen entstehen.</p>
    <p style="margin:0 0 6px;"><b>Verflechtung</b> bestimmt, wie stark Beziehungen zwischen Motiven sichtbar werden.</p>
    <p style="margin:0 0 6px;"><b>Verschmelzung</b> regelt die Tendenz naher Formen, sich anzunähern oder zu verbinden.</p>
    <p style="margin:0 0 6px;"><b>Spannung</b> verändert das Verhältnis von Konzentration und Streuung.</p>
    <p style="margin:0 0 6px;"><b>Anziehung</b> skaliert die Gravitationskraft des Systems.</p>
    <p style="margin:0 0 24px;"><b>Motivanker zeigen</b> blendet die technischen Gravitationspunkte ein.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">NACHBARSCHAFTEN</div>
    <p style="margin:0 0 10px;"><i>Was reift, leuchtet</i> steht in der Nähe verschiedener Verfahren, ohne mit ihnen identisch zu sein. Es berührt Textvisualisierung und Distant Reading, semantische Netzwerkanalyse und Co-Occurrence-Modelle, dynamische Netzwerkvisualisierung und generative Kunst.</p>
    <p style="margin:0 0 24px;">Das Ergebnis ist weder ein wissenschaftliches Instrument noch ein dekoratives Muster. Es liegt dazwischen: ein regelbasiertes Bildereignis, das einen Gedankengang sichtbar macht, ohne zu behaupten, ihn vollständig zu verstehen.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">GRENZE</div>
    <p style="margin:0 0 10px;">Die Visualisierung behauptet nicht, einen Chat zu verstehen. Sie zeigt, was ihre Regeln aus dem Text gewinnen können: Wiederkehr, Verdichtung, Nähe, Spannung, Verschiebung, Sediment.</p>
    <p style="margin:0 0 10px;"><i>Was reift, leuchtet</i> zeigt nicht, was ein Gespräch bedeutet.</p>
    <p style="margin:0 0 32px;">Es zeigt, was in ihm wiederkehrt, was sich verbindet, was ruht — und was erneut zu leuchten beginnt.</p>

        <div style="font:12.5px/1.4 ui-sans-serif,system-ui,sans-serif;color:rgba(200,168,75,.75);font-style:italic;">A visualisation of chat conversations &middot; E. R. A. Hiller, 2026</div>

    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">THOUGHT AS TOPOLOGY</div>
    <p style="margin:0 0 10px;">A chat is more than a sequence of messages. It has an inner shape: thoughts emerge, are abandoned, return, branch, condense, or lose weight. Some terms appear only briefly. Others carry the conversation over longer stretches. Still others rest for a while and are taken up again later.</p>
    <p style="margin:0 0 10px;"><i>What ripens, gleams</i> attempts to make this movement visible: not as a summary, not as an evaluation, and not as an illustration of particular contents, but as a spatio-temporal <b>topology of a line of thought</b>.</p>
    <p style="margin:0 0 24px;">Topology here means: the order of proximity, recurrence, weighting and connection. What lies close together in the text, what repeats, what returns later or connects to other motifs, receives a spatial and temporal correspondence. A moving image field emerges from the course of the chat.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">METHOD</div>
    <p style="margin:0 0 10px;">The entered text is examined locally in the browser. It is divided into segments, normalised, and evaluated for recurring words, motifs, distributions and relationships. What counts is not only how frequently a term appears, but also when it occurs, how far it extends through the conversation, with which other terms it stands in proximity, and whether it is taken up again later.</p>
    <p style="margin:0 0 10px;">From these signals, motifs emerge. A motif here is neither an explanatory keyword nor a semantic interpretation, but a visual centre of gravity around which forms, movements, connections and sediments gather.</p>
    <p style="margin:0 0 24px;">The method uses no language model and no external AI evaluation. It does not decide what a chat &ldquo;means&rdquo;. It reads texture: repetition, distance, proximity, density, tension, return. Therein lies its limit, but also its accuracy. The work does not understand the text as a human would; it makes visible the formal traces the text itself produces.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">FROM TEXT TO IMAGE BODY</div>
    <p style="margin:0 0 10px;">The text is the skeleton of the visualisation. It determines the inner order: motifs, centres, relationships, impulses and phases of maturation. Once this structure has been evaluated, the text itself recedes. What remains is no longer a readable chat, but an image body that has emerged from it.</p>
    <p style="margin:0 0 10px;">The visualisation therefore does not show the text as text. It shows what remains when its linguistic surface is removed: a moving topology of condensation, memory, recurrence and connection.</p>
    <p style="margin:0 0 24px;">Thus a peculiar shift emerges. The chat is not explained, but transferred into another state. Sentences become forces. Repetitions become centres. Returns become reactivations. The past becomes sediment.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">WHAT HAPPENS IN THE IMAGE</div>
    <p style="margin:0 0 10px;">At the beginning, individual forms appear, still loose and tentative. As the course unfolds, clusters emerge. Some condense, others remain peripheral, some recede. Between related motifs, filaments and travelling lights form. They mark relationships, transitions and renewed activations without turning them into a diagram.</p>
    <p style="margin:0 0 10px;">The clusters not only move through the image; their forms can also rotate around shared centres. This rotation is conceived as an inner movement of a motif field. It leaves no trace of movement, but shifts and orders the cluster from within.</p>
    <p style="margin:0 0 10px;">What disappears from the foreground is not deleted. It passes into a memory layer: as sediment, as a faint remainder, as a shell. When an earlier theme is taken up again later, parts of these sediments can begin to glow again. Memory thus appears not as an archive of finished signs, but as material that can rest, continue to resonate, and become active again.</p>
    <p style="margin:0 0 24px;">The same text generates a related basic structure, but no pixel-precise repetition. The topology remains recognisable, while the concrete execution varies. The image is therefore neither pure chance nor depiction. It is a possibility of the text.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">THE SLIDERS</div>
    <p style="margin:0 0 10px;">The sliders are not mere post-processing. They determine how the chat is read as an image body. When a text is evaluated, the sliders first adjust to the recognised text structure. A short, thin text begins differently from a long, strongly networked chat. Afterwards, all values remain manually adjustable.</p>

    <p style="margin:0 0 6px;"><b>Speed</b> — controls how quickly the visual process unfolds.</p>
    <p style="margin:0 0 6px;"><b>Memory</b> — controls how strongly the past remains in the image. At high values, forms sediment more clearly.</p>
    <p style="margin:0 0 6px;"><b>Centres</b> — sets how many motif centres can become active at most.</p>
    <p style="margin:0 0 6px;"><b>Maturation</b> — influences how quickly visible forms emerge from textual impulses.</p>
    <p style="margin:0 0 6px;"><b>Entanglement</b> — determines how strongly relationships between motifs become visible.</p>
    <p style="margin:0 0 6px;"><b>Fusion</b> — controls the tendency of nearby forms to approach or connect with one another.</p>
    <p style="margin:0 0 6px;"><b>Tension</b> — changes the relation between concentration and dispersal.</p>
    <p style="margin:0 0 6px;"><b>Attraction</b> — scales the gravitational force of the system.</p>
    <p style="margin:0 0 24px;"><b>Show motif anchors</b> — reveals the technical gravitational points of the construction.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">NEIGHBOURHOODS</div>
    <p style="margin:0 0 10px;"><i>What ripens, gleams</i> is close to various procedures without being identical to them. It touches on text visualisation and distant reading, semantic network analysis and co-occurrence models, dynamic network visualisation and generative art.</p>
    <p style="margin:0 0 24px;">The result is neither a scientific instrument nor a decorative pattern. It lies in between: a rule-based image event that makes a line of thought visible without claiming to understand it fully.</p>
    <div style="color:rgba(200,168,75,.78);font:bold 10.5px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:1.3px;margin:0 0 9px;">LIMIT</div>
    <p style="margin:0 0 10px;">The visualisation does not claim to understand a chat. It shows what its rules can extract from the text: recurrence, condensation, proximity, tension, displacement, sediment.</p>
    <p style="margin:0 0 10px;"><i>What ripens, gleams</i> does not show what a conversation means.</p>
    <p style="margin:0 0 32px;">It shows what recurs within it, what connects, what rests &mdash; and what begins to gleam again.</p>

function visibleAnchorDrift(){

}

  const base=Math.min(W,H);

function anchorContactData(l){

  if(!A||!B)return null;

  // Beziehung darf nicht mehr genuegen, nur weil zwei Cluster verbunden sind.
  if(contact<=.18 && overlap<.05)return null;
  if(d>base*.50 && contact<.34)return null;

function spiderPhaseFactor(reason){
  const p=runProgressEstimate();
  // Zeitliche Balance: Spider/Sterne sollen nicht als Fruehphaenomen erscheinen.
  // Der Beginn bleibt leicht gedaempft; mittlere und spaete Reifungsphasen
  // werden stabil gehalten, damit Kontaktspannung weiter sichtbar bleibt.
  let f;
  if(p<.18) f=.62+.30*(p/.18);
  else if(p<.62) f=.92+.12*ease((p-.18)/.44);
  else f=1.04+.28*ease((p-.62)/.38);
  if(reason==='birth'||reason==='fresh') f*=p<.28 ? (.62+.38*(p/.28)) : 1.00;
  if(reason==='ambient'||reason==='contact') f*=p>.42 ? (1.06+.20*ease((p-.42)/.58)) : 1.00;
  if(reason==='contrast'||reason==='approach'||reason==='switch') f*=1.00+.12*p;
  // Wenn gerade wenige Spider aktiv sind, wird spaeter nicht weiter ausgeduennt.
  if(edgeSpiderActiveCount()<2&&p>.34) f*=1.14+.18*p;

function edgeSpiderPathLength(l,curve){
  if(!l||!anchors[l.a]||!anchors[l.b])return Math.min(W,H)*.22;
  const A=anchors[l.a],B=anchors[l.b],C={x:l.cpx,y:l.cpy};
  const k=clamp(curve==null?.32:curve,0,.62);
  let len=0,prev=runPos(A,C,B,0,k);
  for(let i=1;i<=8;i++){
    const p=runPos(A,C,B,i/8,k);

  if(d>base*.62 && contact<.28)return -1;
  const active=(l.a===focus.current||l.b===focus.current)?1:0;
  const moving=(clusterMotionWeight(l.a)+clusterMotionWeight(l.b))*.5;
  const pulse=(anchorPulse(l.a)+anchorPulse(l.b))*.5;

function counterMix(a,b,t){t=clamp(t,0,1);return [Math.round(mix(a[0],b[0],t)),Math.round(mix(a[1],b[1],t)),Math.round(mix(a[2],b[2],t))];}
function activeCounterStops(){return (analysis&&analysis.counterStops&&analysis.counterStops.length)?analysis.counterStops:COUNTER_STOPS_BASE;}
function counterPhaseColor(p){
  const stops=activeCounterStops();p=clamp(p,0,1);
  for(let i=1;i<stops.length;i++){
    const a=stops[i-1],b=stops[i];
    if(p<=b.p){return counterMix(a.c,b.c,(p-a.p)/Math.max(.0001,b.p-a.p));}
  }
  return stops[stops.length-1].c.slice();
}
function counterDisplayColor(c){
  c=temperedWhite(c);
  const lum=.2126*c[0]+.7152*c[1]+.0722*c[2];
  if(lum<92){c=blend(c,[190,202,255],clamp((92-lum)/92*.24,0,.24));}
  return temperedWhite(c);
}
function counterRoundedRectPath(c,x,y,w,h,r){
  r=Math.max(0,Math.min(r,w*.5,h*.5));
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
}
function drawCounterCanvas(p){
  const bar=document.getElementById('counter-bar');
  const canvas=document.getElementById('counter-canvas');
  if(!bar||!canvas)return null;
  const rect=bar.getBoundingClientRect();
  const w=Math.max(1,rect.width||72);
  const h=Math.max(1,rect.height||7);
  const dpr=Math.max(1,window.devicePixelRatio||1);
  const cw=Math.max(1,Math.round(w*dpr));
  const ch=Math.max(1,Math.round(h*dpr));
  if(canvas.width!==cw)canvas.width=cw;
  if(canvas.height!==ch)canvas.height=ch;
  const c=canvas.getContext('2d');
  if(!c)return null;
  c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,w,h);
  const r=Math.min(4,h*.5);
  c.beginPath();
  counterRoundedRectPath(c,0,0,w,h,r);
  c.fillStyle='rgba(210,220,255,.035)';
  c.fill();
  const fillW=clamp(p,0,1)*w;
  if(fillW>.01){
    c.save();
    c.beginPath();
    counterRoundedRectPath(c,0,0,w,h,r);
    c.clip();
    // Durchgehende Flaeche: keine innere DOM-Maske, kein gerundetes Zwischenende,
    // keine CSS-Transition. Der rechte Fortschrittsrand bleibt bis 100% gerade.
    c.fillStyle='rgba(210,220,255,.105)';
    c.fillRect(0,0,fillW,h);
    const g=c.createLinearGradient(0,0,w,0);
    activeCounterStops().forEach(st=>{
      const cc=counterDisplayColor(st.c);
      const alpha=st.p>=.68&&st.p<.90?.86:.84;
      g.addColorStop(clamp(st.p,0,1),'rgba('+Math.round(cc[0])+','+Math.round(cc[1])+','+Math.round(cc[2])+','+alpha+')');
    });
    c.fillStyle=g;
    c.fillRect(0,0,fillW,h);
    c.restore();
  }
  return {bar,w,h};
}
function setCounterProgress(p){
  p=clamp(p,0,1);
  const c=counterDisplayColor(counterPhaseColor(p));
  const drawn=drawCounterCanvas(p);
  if(drawn&&drawn.bar){
    drawn.bar.style.boxShadow='0 0 7px rgba('+c[0]+','+c[1]+','+c[2]+',0.17)';
  }
}
function fadeCurve(p){
  p=clamp(p,0,1);
  // Nichtlinearer, verzoegerter Fade: Der Anfang bleibt sehr sanft,
  // erst spaeter nimmt die Abdunkelung merklich zu.
  const s=p*p*(3-2*p);
  return s*s;
}
function resetLifecycle(){fadeState='running';fadeAlpha=1.0;fadeApplied=0.0;tempoScale=1.0;frameDt=1.0;phaseStartMs=0;allTurnsDoneAt=-1;runStartMs=performance.now();setCounterProgress(0);}
function checkLifecycle(){
  const now=performance.now();
  const elapsed=now-runStartMs;
  const targetEnd=clamp((analysis&&analysis.targetRunMs)||MIN_MS,MIN_MS,MAX_MS);
  if(allTurnsDoneAt<0&&turnIndex>=analysis.turns.length&&analysis.turns.length>0){allTurnsDoneAt=elapsed;}
  const doneEnd=allTurnsDoneAt>0?allTurnsDoneAt+COOLDOWN_MS:Infinity;
  const endAt=allTurnsDoneAt>0?Math.min(MAX_MS,Math.max(targetEnd,doneEnd)):MAX_MS;
  if(fadeState==='running'){
    let progress;
    if(allTurnsDoneAt>0){
      progress=elapsed/Math.max(1,endAt);
    }else if(elapsed<targetEnd){
      // Vor der Zielzeit reift der Balken sichtbar, bleibt aber noch offen.
      progress=.88*(elapsed/Math.max(1,targetEnd));
    }else{
      // Dichte Texte, die noch nicht fertig gelesen sind, wachsen langsam weiter bis zur Maximalzeit.
      progress=.88+.10*((elapsed-targetEnd)/Math.max(1,MAX_MS-targetEnd));
    }
    setCounterProgress(progress);
  }
  const reachedNaturalEnd=allTurnsDoneAt>=0&&elapsed>=endAt;
  const reachedHardEnd=elapsed>=MAX_MS;
  if(fadeState==='running'&&(reachedNaturalEnd||reachedHardEnd)){fadeState='slowdown';phaseStartMs=now;tempoScale=1.0;setCounterProgress(1);}
  else if(fadeState==='slowdown'){const p=(now-phaseStartMs)/SLOWDOWN_MS;tempoScale=clamp(1-p,0,1);if(p>=1){fadeState='still';phaseStartMs=now;tempoScale=0;}}
  else if(fadeState==='still'&&now-phaseStartMs>=STILL_MS){fadeState='fading';phaseStartMs=now;fadeAlpha=1.0;fadeApplied=0.0;}
  else if(fadeState==='fading'){const p=(now-phaseStartMs)/FADE_MS;const target=fadeCurve(p);fadeAlpha=clamp(1-target,0,1);if(p>=1){fadeAlpha=0;fadeState='restarting';}}
  else if(fadeState==='restarting'){restartAfterCompletion();}}
function applyFade(){
  const target=clamp(1-fadeAlpha,0,1);
  if(target<=fadeApplied+.0001)return;
  // Die Canvas-Inhalte werden nicht neu aufgebaut; deshalb muss hier nur
  // die Differenz zur bereits erreichten Abdunkelung gezeichnet werden.
  // So entspricht die sichtbare Gesamtabdunkelung der nichtlinearen Kurve
  // und startet nicht abrupt durch kumulierte lineare Ueberlagerungen.
  const alpha=clamp((target-fadeApplied)/Math.max(.001,1-fadeApplied),0,1);
  fadeApplied=target;
  for(const id of ids){const c=ctx[id];if(!c)continue;c.save();c.globalCompositeOperation='source-over';c.fillStyle='rgba(0,0,0,'+alpha+')';c.fillRect(0,0,W,H);c.restore();}
}
function step(){if(fadeState==='still'||fadeState==='fading'||fadeState==='restarting')return;frameDt=clamp(tempoScale,0,1);if(frameDt<=0)return;T+=frameDt;maybeTurnImpulse();maybeContinuityImpulse();maybeSustainImpulse();tickAnchors();maybeSpawn();for(let i=entities.length-1;i>=0;i--){const e=entities[i];if(e.deadFlag){if(!e.finalRemembered||!e.finalHullRemembered)e.archive(false,true,true);entities.splice(i,1);continue;}e.tick();if(e.dead()){if(!e.finalRemembered||!e.finalHullRemembered)e.archive(false,true,true);entities.splice(i,1);}}handleInteractions();tickFilaments();tickEdgeSpiders();mem.tick();maybeAmbientRun();}
function render(){if(fadeState==='running'||fadeState==='slowdown'){const live=ctx['c-live'];live.clearRect(0,0,W,H);live.save();sceneTransform(live);for(const e of entities)e.draw();live.restore();mem.draw();drawRuns();}if(frame%5===0&&fadeState!=='fading')drawUI();applyFade();if(frame%30===0){document.getElementById('t').innerHTML='t = '+Math.round(T)+'<br>'+(analysis.demo?'demo':'chat')+' / z = '+activeCount();}}
function loop(){frame++;checkLifecycle();step();render();requestAnimationFrame(loop);}
const CONTROL_DEFAULTS={density:4,tempo:4,memory:5,maxCenters:6,birth:5,network:6,fusion:4,spannung:5,attraction:6};
const CONTROL_IDS=['density','tempo','memory','maxCenters','birth','network','fusion','attraction'];
const CONTROL_MAP={
  density: v=>0.50+v/10*1.05,        // 0.50–1.55
  tempo:   v=>0.60+v/10*0.90,        // 0.60–1.50
  memory:  v=>{const x=v/10;if(x<=.5){const t=x/.5;return .125+Math.pow(t,1.35)*(1.25-.125);}const t=(x-.5)/.5;return 1.25+Math.pow(t,.85)*(1.80-1.25);}, // 0.125-1.80; 5 bleibt 1.25
  network: v=>0.45+v/10*1.30,        // 0.45–1.75
  fusion:  v=>Math.pow(v/10,1.15)*2.00, // 0.00–2.00; unten fast aus, oben deutlich sichtbarer
  maxCenters: v=>Math.max(1,Math.round(v)), // 1-10, zahlentreu
  birth: v=>0.40+v/10*1.60,       // 0.40-2.00
  attraction: v=>0.002+Math.pow(v/10,1.10)*3.150 // 0.002-3.152; 0 = minimale Bewegung
};
function setControlValue(id,value){
  const inp=document.getElementById(id),out=document.getElementById(id+'V');
  const def=CONTROL_DEFAULTS[id]==null?0:CONTROL_DEFAULTS[id];
  let n=Number(value);if(!Number.isFinite(n))n=def;
  const min=id==='maxCenters'?1:0,max=10;n=clamp(Math.round(n),min,max);
  if(inp)inp.value=String(n);if(out)out.textContent=String(n);
  if(id==='spannung'){
    const v=n/10;
    set.focus=0.62+v*1.00;
    set.side=0.03+Math.pow(v,1.2)*0.185;
    set.switchRate=0.24+v*1.40;
    return;
  }
  if(CONTROL_MAP[id]){
    set[id]=CONTROL_MAP[id](n);
    if(id==='maxCenters'&&focus.current>=set.maxCenters)switchTo(Math.max(0,set.maxCenters-1),'limit');
  }
}
function applyControlProfile(profile){
  profile=profile||CONTROL_DEFAULTS;
  for(const id of CONTROL_IDS)setControlValue(id,profile[id]==null?CONTROL_DEFAULTS[id]:profile[id]);
  setControlValue('spannung',profile.spannung==null?CONTROL_DEFAULTS.spannung:profile.spannung);
}
function relationProfileStats(a){
  const r=a&&a.relations,n=a&&a.motifs?Math.min(a.motifs.length,r?r.length:0):0;
  let sum=0,count=0,strong=0;
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){
    const v=clamp((r[i]&&r[i][j])||0,0,1);sum+=v;count++;if(v>.24)strong++;
  }
  return {avg:count?sum/count:0,strong:count?strong/count:0};
}
function deriveTextControlProfile(a){
  if(!a||a.demo)return {...CONTROL_DEFAULTS};
  const motifs=a.motifs||[],turns=a.turns||[],n=motifs.length;
  const motifScore=clamp((n-1)/11,0,1);
  const rawMotifScore=clamp(((a.rawMotifCount||n)-1)/18,0,1);
  const substance=clamp(a.substance==null?1:a.substance,0,1);
  const runScope=clamp(a.runScope==null?0.5:a.runScope,0,1);
  const turnScore=clamp(turns.length/28,0,1);
  const tokenScore=clamp((a.tokenCount||0)/520,0,1);
  const repeatNorm=clamp((a.repeatCount||motifs.filter(m=>(m.freq||1)>1).length)/Math.max(1,Math.min(10,(a.rawMotifCount||n)||1)),0,1);
  const spanAvg=motifs.length?motifs.reduce((s,m)=>s+clamp(m.span||0,0,1),0)/motifs.length:0;
  const rel=relationProfileStats(a);
  const relNorm=clamp(rel.avg/.32,0,1);
  const strongRel=clamp(rel.strong/.30,0,1);
  const avgImpulse=clamp(a.avgImpulse==null?(turns.reduce((s,t)=>s+(t.intensity||0),0)/Math.max(1,turns.length)):a.avgImpulse,0,1.15)/1.15;
  const qc=turns.filter(t=>t.cat==='question'||t.cat==='critique').length;
  const qCrit=clamp(qc/Math.max(1,turns.length),0,1);
  const punct=clamp((a.punctuationCount||0)/8,0,1);
  const intensities=turns.map(t=>t.intensity||0);
  const mean=intensities.length?intensities.reduce((s,v)=>s+v,0)/intensities.length:0;
  const variance=intensities.length?intensities.reduce((s,v)=>s+(v-mean)*(v-mean),0)/intensities.length:0;
  const impulseVar=clamp(Math.sqrt(variance)/.32,0,1);
  // Zentren: Top-Motivzahl saettigt nicht mehr allein; Umfang, Laufzeit und Turnstruktur staffeln kurz/mittel/lang staerker.
  const centers=clamp(2.55+motifScore*2.75+substance*1.15+repeatNorm*.45+rawMotifScore*.30+runScope*1.15+tokenScore*.55+turnScore*1.05-(relNorm>.78?.55:0),1,10);
  const density=clamp(2.0+substance*2.45+avgImpulse*.85+turnScore*.55+tokenScore*.35-(a.thinInput?.65:0),1,7);
  const tempo=clamp(4+(avgImpulse-.58)*.9+(turnScore-.45)*.45-(a.thinInput?.45:0),3,5);
  const memory=clamp(3.5+repeatNorm*1.8+spanAvg*1.55+substance*.85+runScope*.55-(a.fragmentInput?.55:0),3,8);
  const birth=clamp(2.3+substance*2.75+runScope*1.25+avgImpulse*.75+motifScore*.45-(a.fragmentInput?.75:0),2,8);
  const network=clamp(2.4+relNorm*2.7+strongRel*.95+motifScore*.95+substance*.75,2,8);
  const cohesion=clamp(relNorm*.62+strongRel*.38,0,1);
  const fusion=clamp(2.0+cohesion*2.55+repeatNorm*.55+(1-motifScore)*relNorm*.75-motifScore*.40-(qCrit>.28?.35:0),1,6);
  const spannung=clamp(3.5+qCrit*2.85+punct*1.15+impulseVar*1.15+avgImpulse*.50,2,8);
  const attraction=clamp(3.8+relNorm*1.55+strongRel*.80+repeatNorm*.75+substance*.65-(motifScore>.78?.35:0),3,8);
  return {
    density:Math.round(density),
    tempo:Math.round(tempo),
    memory:Math.round(memory),
    maxCenters:Math.round(centers),
    birth:Math.round(birth),
    network:Math.round(network),
    fusion:Math.round(fusion),
    spannung:Math.round(spannung),
    attraction:Math.round(attraction)
  };
}
function applyText(txt){
  resize();
  const hasText=!!(txt||'').trim();
  analysis=analyseText(txt,!hasText);
  seed=analysis.seed;
  applyControlProfile(hasText?deriveTextControlProfile(analysis):CONTROL_DEFAULTS);
  updateTopologySalt();
  resetLifecycle();
  updateStatus();
  resetScene();
}
function restartAfterCompletion(){
  const chatEl=document.getElementById('chat');
  if(analysis&&!analysis.demo){
    if(chatEl)chatEl.value='';
    applyText('');
  }else{
    applyText(chatEl?chatEl.value:'');
  }
}
function wire(){
document.getElementById('toggle').onclick=()=>document.getElementById('panel').classList.toggle('open');
const langDE=document.getElementById('langDE');if(langDE)langDE.addEventListener('click',()=>window.setLang('de'));
const langEN=document.getElementById('langEN');if(langEN)langEN.addEventListener('click',()=>window.setLang('en'));
// Mapping: 0-10 -> interner Wertebereich
const ids=CONTROL_IDS;
for(const id of ids){
  const inp=document.getElementById(id);
  inp.oninput=()=>setControlValue(id,inp.value);
}
// Spannung: 0-10 -> focus, side, switchRate
const spInp=document.getElementById('spannung');
spInp.oninput=()=>setControlValue('spannung',spInp.value);
document.getElementById('show').onchange=e=>{set.show=e.target.checked;drawUI();};
document.getElementById('analyse').onclick=()=>applyText(document.getElementById('chat').value);
document.getElementById('demo').onclick=()=>{document.getElementById('chat').value='';applyText('');};
document.getElementById('reset').onclick=()=>{resetLifecycle();updateStatus();resetScene();};
for(const id of ids)document.getElementById(id).oninput();
spInp.oninput();
}
updateTopologySalt();refreshMotifLayout();wire();updateStatus();resetLifecycle();resetScene();const params=new URLSearchParams(location.search);if(params.get('debug')==='1'){const td=document.getElementById('t');if(td)td.style.display='';}const target=parseInt(params.get('t')||'0',10);if(target>0){while(T<target)step();render();window.__done=true;}else{requestAnimationFrame(loop);}
const creditBtn=document.getElementById('creditBtn');if(creditBtn)creditBtn.addEventListener('click',()=>{const ov=_getOverlay();if(!ov)return;const de=ov.querySelector('.overlay-de');const en=ov.querySelector('.overlay-en');if(de)de.style.display=currentLang==='de'?'':'none';if(en)en.style.display=currentLang==='en'?'':'none';ov.style.display='block';});
})();
</script>
